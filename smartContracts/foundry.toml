[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts",
    "@prb/math/=lib/prb-math",
    "forge-std/=lib/forge-std/src",
]

solc_version = "0.8.28"
optimizer = { enabled = true, runs = 200 }
evm_version = "cancun"
via_ir = false

[fuzz]
max_test_rejects = 65536
seed = "0x3e8"
show_progress = true

[invariant]
runs = 256
max_asserts = 20_000
max_call_depth = 50
fail_on_revert = false

[rpc_endpoints]
celo = "https://forno.celo.org"
celoSepolia = "https://forno.celo-sepolia.celo-testnet.org"

[etherscan]
celo = { key = "${CELOSCAN_API_KEY}" }
celoSepolia = { key = "${CELOSCAN_API_KEY}" }
