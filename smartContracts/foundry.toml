[profile.default]
src = "contracts"
out = "out"
libs = ["lib", "node_modules"]

remappings = [
    "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/",
    "forge-std/=node_modules/forge-std/src/",
]

solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
via_ir = false

[fuzz]
max_test_rejects = 65536
seed = "0x3e8"

[invariant]
runs = 256
fail_on_revert = false

[rpc_endpoints]
celo = "https://forno.celo.org"
celoSepolia = "https://forno.celo-sepolia.celo-testnet.org"

[etherscan]
celo = { key = "${CELOSCAN_API_KEY}" }
celoSepolia = { key = "${CELOSCAN_API_KEY}" }
